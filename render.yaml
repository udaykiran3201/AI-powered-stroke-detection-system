services:
  - type: web
    name: stroke-detection-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://ai-powered-stroke-detection-system.vercel.app,http://localhost:3000,http://localhost:5173"

